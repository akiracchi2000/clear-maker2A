<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clear Maker 2A (生徒用)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="student.css">
</head>
<body>
    <header class="app-header" style="align-items: center;">
        <div style="display: flex; align-items: baseline; gap: 8px;">
            <h1>Clear Maker 2A</h1>
            <span style="font-size: 0.9rem; color: rgba(255, 255, 255, 0.8); font-weight: 600;">v0.1.17</span>
        </div>
        <button id="settings-btn" class="icon-btn">⚙️</button>
    </header>

    <main class="app-content">
        <!-- 初期設定モーダル -->
        <div id="setup-modal" class="modal hidden">
            <div class="modal-content">
                <h2>初期設定</h2>
                <p>あなたの生徒番号（または名前）を登録してください。</p>
                <div class="form-group">
                    <label for="student-id">生徒番号 / 名前</label>
                    <input type="text" id="student-id" placeholder="例: 1234, 山田太郎">
                </div>
                <button id="save-setup-btn" class="primary-btn">登録する</button>
            </div>
        </div>

        <!-- 状態表示 (生徒ID) -->
        <div id="user-info" class="user-info hidden">
            <span>生徒: </span><strong id="display-student-id"></strong>
        </div>

        <!-- 問題番号設定 -->
        <div class="problem-section" style="background: var(--bg-secondary); padding: 20px; border-radius: var(--radius-lg); margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
            <label style="font-weight: 600; display: block; margin-bottom: 8px;">📚 解答する問題</label>
            <div style="display: flex; gap: 10px;">
                <select id="round-select" style="flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-size: 1rem; background-color: var(--bg-primary);">
                    <option value="">-- データ読込中... --</option>
                </select>
                <select id="problem-select" disabled style="flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-size: 1rem; background-color: var(--bg-primary);">
                    <option value="">-- 問題を選択 --</option>
                </select>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 8px;">先生から指定された回と問題番号を選択してください。</p>
        </div>

        <!-- 画像アップロード・プレビュー領域 -->
        <div class="upload-section">
            <input type="file" id="camera-input" accept="image/*" capture="environment" class="visually-hidden">
            
            <div id="preview-container" class="preview-container hidden">
                <div id="image-preview-list" class="image-preview-list"></div>
                <div class="preview-actions">
                    <button id="add-more-btn" class="secondary-btn">📸 追加する</button>
                    <button id="clear-all-btn" class="secondary-btn">🗑️ 全てクリア</button>
                </div>
            </div>
            
            <button id="upload-btn" class="primary-btn large-btn">
                📸 解答を撮影・追加する
            </button>
        </div>

        <!-- 添削実行実行ボタン -->
        <div class="action-section">
            <button id="evaluate-btn" class="primary-btn massive-btn hidden">
                ✨ 添削する ✨
            </button>
        </div>

        <!-- ローディング -->
        <div id="loading-indicator" class="loading hidden">
            <div class="spinner"></div>
            <p>カガワ先生が添削中...<br>少しお待ちください</p>
        </div>

        <!-- 結果表示領域 -->
        <div id="result-section" class="result-section hidden">
            <div id="result-badge" class="result-badge">
                <!-- 合格 or 再チャレンジが表示される -->
            </div>
            <div class="result-details">
                <h3>添削結果</h3>
                <div id="result-content" class="markdown-body">
                    <!-- マークダウン結果がここに出力される -->
                </div>
            </div>
            <button id="new-question-btn" class="secondary-btn" style="margin-top: 20px; width: 100%;">別の問題を添削する</button>
        </div>
    </main>

    <!-- カメラ撮影モーダル -->
    <div id="camera-modal" class="modal hidden" style="padding: 0; background: #000;">
        <div class="camera-viewer">
            <video id="camera-video" autoplay playsinline title="Camera Viewfinder"></video>
            <div class="camera-controls">
                <button id="camera-close-btn" class="camera-btn close" title="閉じる">×</button>
                <div class="camera-bottom-actions">
                    <button id="camera-switch-btn" class="camera-btn switch" title="カメラ切り替え">🔄</button>
                    <button id="camera-shutter-btn" class="camera-btn shutter" title="撮影"></button>
                    <div style="width: 50px;"></div> <!-- バランス用空要素 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 非表示のCanvas (撮影用) -->
    <canvas id="camera-canvas" style="display: none;"></canvas>

    <script src="student.js"></script>
</body>
</html>
